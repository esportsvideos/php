name: PR Preview Cleanup

# Delete the pr-<number> preview images when the PR is closed (merged or not).
# Runs as pull_request_target so the token is privileged even on fork PRs, and
# checks out NO code — it only calls the GitHub API with the PR number.
on:
    pull_request_target:
        types: [closed]

concurrency:
    group: preview-cleanup-${{ github.event.number }}
    cancel-in-progress: false

permissions: {}

jobs:
    cleanup:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            packages: write
        steps:
            -   name: Delete preview image versions
                env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    PR: ${{ github.event.number }}
                    OWNER: ${{ github.repository_owner }}
                    PACKAGE: esportsvideos-php
                run: |
                    for TAG in "PR-${PR}" "PR-${PR}-dev"; do
                      ids=$(gh api --paginate \
                        "/users/${OWNER}/packages/container/${PACKAGE}/versions" \
                        --jq ".[] | select(.metadata.container.tags[]? == \"${TAG}\") | .id" \
                        2>/dev/null || true)
                      for id in $ids; do
                        echo "Deleting ${TAG} (version ${id})"
                        gh api -X DELETE \
                          "/users/${OWNER}/packages/container/${PACKAGE}/versions/${id}"
                      done
                    done
